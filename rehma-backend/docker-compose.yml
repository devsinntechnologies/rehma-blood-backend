services:
  db:
    image: postgres:15
    container_name: rehma_blood
    restart: always

    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}

    ports:
      - "127.0.0.1:5435:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: rehma_redis
    restart: always

    ports:
      - "127.0.0.1:6380:6379"

    volumes:
      - redis_data:/data

    command: redis-server --appendonly yes

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: rehma_app
    restart: always

    environment:
      PORT: 3000
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_NAME: ${DATABASE_NAME}

      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}

      APP_NAME: ${APP_NAME}

      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}

      REDIS_HOST: redis
      REDIS_PORT: 6379

      CHOKIDAR_USEPOLLING: "true"

    depends_on:
      db:
        condition: service_healthy

      redis:
        condition: service_healthy

    ports:
      - "7676:3000"

    volumes:
      - .:/app
      - /app/node_modules
      - /app/dist

    command: npm run start:dev

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  pgadmin:
    image: dpage/pgadmin4
    container_name: rehma_pgadmin
    restart: always

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: pgadmin4

    ports:
      - "5052:80"

    depends_on:
      - db

volumes:
  postgres_data:
  redis_data: